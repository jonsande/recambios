{% load i18n %}
<div id="catalog-brand-field" aria-live="polite">
  <label for="catalog-brand" class="form-label">
    {% trans "Marca de vehículo" %}
  </label>
  <select
    id="catalog-brand"
    name="brand"
    class="form-select"
  >
    <option value="">{% trans "Todas las marcas" %}</option>
    {% for option in vehicle_brand_options %}
      <option value="{{ option.slug }}" {% if option.slug == selected_vehicle_brand_slug %}selected{% endif %}>{{ option.name }}</option>
    {% endfor %}
  </select>
</div>

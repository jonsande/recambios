{% load i18n %}
<div id="catalog-model-field" aria-live="polite">
  <label for="catalog-model" class="form-label">
    {% trans "Modelo de vehículo" %}
  </label>
  <select
    id="catalog-model"
    name="model"
    class="form-select"
  >
    <option value="">{% trans "Todos los modelos" %}</option>
    {% for option in model_options %}
      <option value="{{ option }}" {% if option == selected_vehicle_model %}selected{% endif %}>{{ option }}</option>
    {% endfor %}
  </select>
</div>

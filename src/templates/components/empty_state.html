{% load i18n %}
<section class="rounded-xl border border-dashed border-slate-400 bg-white p-6 text-center">
  <h2 class="text-lg font-semibold text-slate-900">{{ title }}</h2>
  <p class="mt-2 text-sm text-slate-600">{{ message }}</p>
  {% if cta_href and cta_label %}
    <a
      href="{{ cta_href }}"
      class="mt-4 inline-flex rounded-md bg-slate-900 px-4 py-2 text-sm font-medium text-white hover:bg-slate-700 focus:outline-none focus-visible:ring-2 focus-visible:ring-slate-700 focus-visible:ring-offset-2"
    >
      {{ cta_label }}
    </a>
  {% endif %}
</section>

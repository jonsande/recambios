{% load i18n %}
<section class="panel-dashed">
  <p class="meta-copy">{% trans "Sin contenido disponible" %}</p>
  <h2 class="text-lg font-semibold text-text">{{ title }}</h2>
  <p class="mt-2 text-sm text-text-muted">{{ message }}</p>
  {% if cta_href and cta_label %}
    <a
      href="{{ cta_href }}"
      class="mt-4 btn btn-primary"
    >
      {{ cta_label }}
    </a>
  {% endif %}
</section>
